name: docs-gate

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-gate:
    name: Documentation update gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history so the diff-aware gate can reach base

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # If the PR touches framework/ or an engine's src/pyproject/version,
      # CHANGELOG.md must move too — escape with [no-changelog] in a commit
      # message when the change is genuinely not user-facing.
      - name: Run docs gate
        env:
          GATE_BASE: origin/${{ github.base_ref }}
        run: python tests/chg/docs_gate.py
