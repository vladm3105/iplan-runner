name: Security

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "30 3 * * 1"   # weekly, Monday 03:30 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Audit the resolved runtime closure of both engines (base deps only;
      # the optional otel/anthropic/litellm extras are integration-only).
      - name: Install engines + pip-audit
        run: |
          pip install -e ./platforms/hermes -e ./platforms/claude
          pip install pip-audit

      - name: Audit installed environment
        run: pip-audit --progress-spinner off

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the scan covers the whole diff range

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
