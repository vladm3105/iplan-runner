extends: default

rules:
  # The conformance vector/scenario corpus uses mixed sequence indentation;
  # validity is enforced by check-yaml + the conformance suite, so style-only
  # indentation is not gated here.
  indentation: disable
  line-length:
    max: 120
    level: warning
  document-start:
    present: false
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
