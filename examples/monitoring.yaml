metadata:
  schema_version: '1.0'
  document_type: iplan-monitoring-manifest
  framework: iops
  last_updated: '2026-05-27'
  tags:
  - monitoring-manifest
monitor_control:
  monitor_id: MON-IPLAN-EXAMPLE
  source_iplan: IPLAN-EXAMPLE
  source_ledger: LEDGER-IPLAN-EXAMPLE
  status: active
  monitoring_window:
    starts_at: '2026-05-27T00:00:00Z'
    duration: P7D
slos:
- id: SLO-001
  name: Availability
  objective: 99.9
  unit: percent
  window: 30d
  signal_ref: availability_ratio
signals:
  otel:
    traces:
    - name: iplan.task.execution
      kind: internal
      attributes:
      - iplan.id
      - ledger.id
    metrics:
    - name: availability_ratio
      instrument: gauge
      unit: percent
    logs:
    - name: iplan.execution.event
      severity: INFO
probes:
  health: /healthz
  readiness: /readyz
  startup: /startupz
alert_rules:
# evaluate_alerts fires when the referenced SLO is not met (sample < objective).
- id: ALERT-001
  slo_ref: SLO-001
  when: availability_ratio < 99.9
  severity: error
  escalation_owner: operator
