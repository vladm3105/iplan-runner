# IPLAN Post-Implementation Monitoring Manifest — TEMPLATE
#
# Declares how a shipped IPLAN is observed after implementation: SLOs, the
# OpenTelemetry signals that feed them, health probes, and alert rules. Bound to
# the same @iplan / @ledger identity so observation is traceable.
#
# Document type: iplan-monitoring-manifest
# Validation:    category MON-001 (see framework/conformance/rule-ids.yaml)

metadata:
  schema_version: "1.0"
  document_type: "iplan-monitoring-manifest"
  framework: iops
  last_updated: "2026-05-23"
  tags: [monitoring-manifest, post-implementation, otel]

monitor_control:
  monitor_id: "MON-IPLAN-001"
  source_iplan: "IPLAN-001"        # required
  source_ledger: "LEDGER-IPLAN-001"  # required
  status: "active"                 # draft | active | retired
  monitoring_window:
    starts_at: "2026-05-23T00:00:00Z"
    duration: "P7D"

# Each SLO needs an objective and a signal_ref that resolves to a metric below.
slos:
  - id: "SLO-001"
    name: "Availability"
    objective: 99.9
    unit: percent
    window: "30d"
    signal_ref: "availability_ratio"
  - id: "SLO-002"
    name: "Task latency p95"
    objective: 2.0
    unit: seconds
    window: "1d"
    signal_ref: "iplan_task_duration"

signals:
  otel:
    traces:
      - name: "iplan.task.execution"
        kind: internal
        attributes: ["iplan.id", "ledger.id", "task.id", "client.id", "project.id"]
    metrics:
      - name: "availability_ratio"
        instrument: gauge
        unit: "1"
      - name: "iplan_task_duration"
        instrument: histogram
        unit: "s"
    logs:
      - name: "iplan.execution.event"
        severity: INFO

probes:
  health: "/healthz"
  readiness: "/readyz"
  startup: "/startupz"

alert_rules:
  - id: "ALERT-001"
    when: "availability_ratio < 0.999"
    severity: error
    escalation_owner: "operator"
