#   source repo:    iplan-standard (https://github.com/vladm3105/aidoc-flow-iplan-standard)
#   source schema:  schemas/task.schema.json
#   pinned tag:     iplan/v0.1.0
#
# iplan-runner reads only these fields to build the iplan-intake manifest + the
# remote_execution block (see REMOTE_EXECUTOR_CONTRACT.md). The standard's full task
