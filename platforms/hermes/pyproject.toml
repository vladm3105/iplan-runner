[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "iplan-hermes"
version = "1.0.0"
description = "Hermes reference engine for the AI Doc Flow IOps execution framework"
requires-python = ">=3.11"
dependencies = ["pyyaml>=6", "rfc8785>=0.1.4", "cryptography>=42"]

[project.optional-dependencies]
otel = [
  "opentelemetry-api>=1.20",
  "opentelemetry-sdk>=1.20",
  "opentelemetry-exporter-otlp>=1.20",
]
anthropic = ["anthropic>=0.40"]
litellm = ["litellm>=1.40"]
dev = ["pytest>=7", "ruff", "mypy"]

[project.scripts]
iplan-hermes = "iplan_hermes.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
iplan_hermes = ["py.typed"]
